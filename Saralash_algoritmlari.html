{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saralash algoritmlari</title>
    <link rel="stylesheet" href="{% static 'css/saralash.css' %}">

</head>
<body>

    <div class="container">
        <div class="title-box">
            <h1>Saralash algoritmlari</h1>
        </div>

        <div class="content-box">
            <div class="left-menu">
                <a href="{% url 'selection' %}" class="menu-link">Selectionsort</a>
                <a href="{% url 'bubble' %}" class="menu-link">Bubblesort</a>
            </div>

            <div class="right-buttons">
                <form method="GET" action="{% url 'qidirish' %}">
                    <input type="text" name="q" placeholder="Algoritm nomini kiriting..." class="search-input">
                    <button type="submit" class="btn qidirish-btn">
                        Saralash algoritmlarini qidirish
                    </button>
                </form>
                
                <a href="/admin/postapp/post/" class="btn qoshish-btn">
                    Saralash algoritmi qo‘shish
                </a>
            </div>
        </div>
    </div>

</body>
</html>
